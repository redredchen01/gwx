name: google-drive-audit
version: "1.0"
description: "Drive file audit — lists files sorted by modification time to review recent changes."

meta:
  author: gwx
  category: google
  tags: drive

inputs:
  - name: limit
    type: int
    required: false
    default: "50"
    description: "Max files to return"
  - name: folder
    type: string
    required: false
    description: "Folder ID to scope the audit (leave empty for root)"

steps:
  - id: files
    tool: drive_list
    args:
      limit: "{{.input.limit}}"
      folder: "{{.input.folder}}"

output: "{{.steps.files}}"
