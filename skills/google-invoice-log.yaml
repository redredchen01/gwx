name: google-invoice-log
version: "1.0"
description: "Invoice tracker — searches Gmail for invoice/receipt emails and logs them to a Google Sheet."

meta:
  author: gwx
  category: google
  tags: gmail,sheets,finance

inputs:
  - name: sheet-id
    type: string
    required: true
    description: "Target Spreadsheet ID"
  - name: days
    type: int
    required: false
    default: "30"
    description: "Search emails from the last N days"
  - name: limit
    type: int
    required: false
    default: "50"
    description: "Max emails to process"

steps:
  - id: find
    tool: gmail_search
    args:
      query: "subject:(invoice OR receipt OR billing) newer_than:{{.input.days}}d"
      limit: "{{.input.limit}}"

  - id: log
    tool: sheets_append
    args:
      spreadsheet_id: "{{.input.sheet-id}}"
      range: "Invoices!A:D"
      values: "{{.steps.find}}"
    on_fail: skip

output: "{{.steps.find}}"
