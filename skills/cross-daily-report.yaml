name: cross-daily-report
version: "1.1"
description: "Combined daily report — morning-brief + seo-daily. SEO params use config fallback."

meta:
  author: gwx
  category: cross
  tags: gmail,calendar,tasks,seo,sheets
  config_hint: |
    Pre-configure SEO params once:
    gwx config set skill.google-seo-daily.site https://example.com
    gwx config set skill.google-seo-daily.property-id properties/123456
    gwx config set skill.google-seo-daily.sheet-id YOUR_SHEET_ID

inputs:
  - name: email-limit
    type: int
    required: false
    default: "20"
    description: "Max unread emails for morning brief"

steps:
  - id: standup
    tool: skill:google-morning-brief
    args:
      email-limit: "{{.input.email-limit}}"
    on_fail: skip

  - id: seo
    tool: skill:google-seo-daily
    args: {}
    on_fail: skip

output: "{{.steps.standup}}"
