name: cross-client-360
version: "1.0"
description: "Client 360 view — aggregates emails, Drive files, and contact info for a given client keyword."

meta:
  author: gwx
  category: cross
  tags: gmail,drive,contacts

inputs:
  - name: keyword
    type: string
    required: true
    description: "Client name or search keyword"
  - name: limit
    type: int
    required: false
    default: "10"
    description: "Max results per service"

steps:
  - id: emails
    tool: gmail_search
    args:
      query: "{{.input.keyword}}"
      limit: "{{.input.limit}}"

  - id: files
    tool: drive_search
    args:
      query: "name contains '{{.input.keyword}}'"
      limit: "{{.input.limit}}"
    on_fail: skip

  - id: contacts
    tool: contacts_search
    args:
      query: "{{.input.keyword}}"
    on_fail: skip

output: "{{.steps.emails}}"
