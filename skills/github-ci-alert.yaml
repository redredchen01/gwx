name: github-ci-alert
version: "1.0"
description: "CI failure alert — checks recent GitHub Actions runs and sends alerts via Slack and/or email."

meta:
  author: gwx
  category: github
  tags: github,slack,gmail

inputs:
  - name: repo
    type: string
    required: true
    description: "GitHub repo (owner/repo)"
  - name: channel
    type: string
    required: false
    default: ""
    description: "Slack channel for alerts (leave empty to skip Slack)"
  - name: email
    type: string
    required: false
    default: ""
    description: "Email recipient for alerts (leave empty to skip email)"

steps:
  - id: runs
    tool: github_runs
    args:
      owner: "{{.input.repo}}"
      limit: "10"

  - id: slack-alert
    tool: slack_send
    if: "{{.input.channel}}"
    args:
      channel: "{{.input.channel}}"
      text: "CI status update for {{.input.repo}} — last 10 workflow runs"
    on_fail: skip

  - id: email-alert
    tool: gmail_send
    if: "{{.input.email}}"
    args:
      to: "{{.input.email}}"
      subject: "CI Alert: {{.input.repo}}"
      body: "GitHub Actions status update — last 10 workflow runs for {{.input.repo}}"
    on_fail: skip

output: "{{.steps.runs}}"
