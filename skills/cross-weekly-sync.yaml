name: cross-weekly-sync
version: "1.0"
description: "Automated weekly report — aggregates GA4 analytics, email digest, calendar events, and GitHub PRs."

meta:
  author: gwx
  category: cross
  tags: analytics,gmail,calendar,github

inputs:
  - name: sheet-id
    type: string
    required: true
    description: "Weekly report Spreadsheet ID"
  - name: repo
    type: string
    required: false
    default: ""
    description: "GitHub repo (leave empty to skip)"
  - name: ga4-property
    type: string
    required: false
    default: ""
    description: "GA4 Property ID (leave empty to skip)"

steps:
  - id: emails
    tool: gmail_digest
    args:
      limit: "50"
    parallel: true
    on_fail: skip

  - id: events
    tool: calendar_agenda
    args:
      days: "7"
    parallel: true
    on_fail: skip

  - id: ga4
    tool: analytics_report
    if: "{{.input.ga4-property}}"
    args:
      property: "{{.input.ga4-property}}"
      metrics: "sessions,activeUsers"
      dimensions: "date"
      start_date: "7daysAgo"
      end_date: "today"
    parallel: true
    on_fail: skip

  - id: prs
    tool: github_pulls
    if: "{{.input.repo}}"
    args:
      owner: "{{.input.repo}}"
      state: "all"
      limit: "20"
    parallel: true
    on_fail: skip

output: "{{.steps.emails}}"
