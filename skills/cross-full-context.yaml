name: cross-full-context
version: "1.0"
description: "Cross-platform context search — searches Gmail, Drive, Slack, Notion, and GitHub in parallel for a keyword."

meta:
  author: gwx
  category: cross
  tags: gmail,drive,slack,notion,github

inputs:
  - name: keyword
    type: string
    required: true
    description: "Search keyword"
  - name: limit
    type: int
    required: false
    default: "5"
    description: "Max results per service"

steps:
  - id: emails
    tool: gmail_search
    args:
      query: "{{.input.keyword}}"
      limit: "{{.input.limit}}"
    parallel: true
    on_fail: skip

  - id: files
    tool: drive_search
    args:
      query: "name contains '{{.input.keyword}}'"
      limit: "{{.input.limit}}"
    parallel: true
    on_fail: skip

  - id: slack-msgs
    tool: slack_search
    args:
      query: "{{.input.keyword}}"
      limit: "{{.input.limit}}"
    parallel: true
    on_fail: skip

  - id: notion-pages
    tool: notion_search
    args:
      query: "{{.input.keyword}}"
      limit: "{{.input.limit}}"
    parallel: true
    on_fail: skip

  - id: github-notifs
    tool: github_notifications
    args:
      limit: "{{.input.limit}}"
    parallel: true
    on_fail: skip

output: "{{.steps.emails}}"
