name: cross-notion-to-sheet
version: "1.0"
description: "Notion to Sheets sync — queries a Notion database and appends rows to a Google Sheet."

meta:
  author: gwx
  category: cross
  tags: notion,sheets

inputs:
  - name: database-id
    type: string
    required: true
    description: "Notion Database ID"
  - name: sheet-id
    type: string
    required: true
    description: "Target Google Spreadsheet ID"

steps:
  - id: query
    tool: notion_query
    args:
      database_id: "{{.input.database-id}}"
      limit: "100"

  - id: write
    tool: sheets_append
    args:
      spreadsheet_id: "{{.input.sheet-id}}"
      range: "Notion!A:Z"
      values: "{{.steps.query}}"
    on_fail: skip

output: "{{.steps.query}}"
