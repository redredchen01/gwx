name: google-email-digest
version: "1.0"
description: "Smart email digest — categorizes recent emails by sender and type (CI, transactional, personal) with a summary."

meta:
  author: gwx
  category: google
  tags: gmail

inputs:
  - name: limit
    type: int
    required: false
    default: "30"
    description: "Max messages to analyze"
  - name: unread
    type: bool
    required: false
    default: "false"
    description: "Only include unread messages"

steps:
  - id: digest
    tool: gmail_digest
    args:
      limit: "{{.input.limit}}"
      unread: "{{.input.unread}}"

output: "{{.steps.digest}}"
