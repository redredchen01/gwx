name: cross-onboard-checklist
version: "1.0"
description: "New hire onboarding — creates a Drive folder, welcome doc, orientation meeting, and sends notifications via Slack and email."

meta:
  author: gwx
  category: cross
  tags: drive,docs,calendar,slack,gmail

inputs:
  - name: name
    type: string
    required: true
    description: "New hire's name"
  - name: email
    type: string
    required: true
    description: "New hire's email address"
  - name: team-channel
    type: string
    required: false
    default: ""
    description: "Slack channel for team announcement (leave empty to skip)"

steps:
  - id: folder
    tool: drive_mkdir
    args:
      name: "Onboarding - {{.input.name}}"
    on_fail: skip

  - id: welcome-doc
    tool: docs_create
    args:
      title: "Welcome {{.input.name}}"
      body: "Welcome to the team! Please review the resources below to get started."
    on_fail: skip

  - id: meeting
    tool: calendar_create
    args:
      title: "Welcome {{.input.name}} — Orientation"
      duration: "60"
      attendees: "{{.input.email}}"
    on_fail: skip

  - id: notify-slack
    tool: slack_send
    if: "{{.input.team-channel}}"
    args:
      channel: "{{.input.team-channel}}"
      text: "Welcome {{.input.name}} to the team!"
    on_fail: skip

  - id: notify-email
    tool: gmail_send
    args:
      to: "{{.input.email}}"
      subject: "Welcome aboard!"
      body: "Hi {{.input.name}}, welcome to the team. We've set up a Drive folder and welcome doc for you."
    on_fail: skip

output: "{{.steps.folder}}"
