name: google-chat-summary
version: "1.0"
description: "Google Chat catchup — reads recent messages from a Chat space for quick context."

meta:
  author: gwx
  category: google
  tags: chat

inputs:
  - name: space
    type: string
    required: true
    description: "Chat space name (e.g. spaces/XXXXXXXXX)"
  - name: limit
    type: int
    required: false
    default: "20"
    description: "Max messages to retrieve"

steps:
  - id: messages
    tool: chat_messages
    args:
      space: "{{.input.space}}"
      limit: "{{.input.limit}}"

output: "{{.steps.messages}}"
