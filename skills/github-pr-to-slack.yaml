name: github-pr-to-slack
version: "1.0"
description: "Open PR summary to Slack — posts a count of open pull requests awaiting review to a Slack channel."

meta:
  author: gwx
  category: github
  tags: github,slack

inputs:
  - name: repo
    type: string
    required: true
    description: "GitHub repo (owner/repo)"
  - name: channel
    type: string
    required: true
    description: "Slack channel ID or name"

steps:
  - id: prs
    tool: github_pulls
    args:
      owner: "{{.input.repo}}"
      state: "open"
      limit: "20"

  - id: count
    tool: transform
    args:
      input: "{{.steps.prs}}"
      count: "true"

  - id: post
    tool: slack_send
    if: "{{.steps.count}}"
    args:
      channel: "{{.input.channel}}"
      text: "{{.input.repo}} has {{.steps.count}} open PR(s) awaiting review"
    on_fail: skip

output: "{{.steps.prs}}"
