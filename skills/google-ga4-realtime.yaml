name: google-ga4-realtime
version: "1.0"
description: "GA4 realtime snapshot — active users right now, broken down by country and device category."

meta:
  author: gwx
  category: google
  tags: analytics,ga4

inputs:
  - name: property
    type: string
    required: false
    description: "GA4 property ID (e.g. properties/123456); uses config default if omitted"
  - name: dimensions
    type: string
    required: false
    default: "country,deviceCategory"
    description: "Comma-separated dimensions to break down by"

steps:
  - id: realtime
    tool: analytics_realtime
    args:
      property: "{{.input.property}}"
      metrics: "activeUsers,screenPageViews"
      dimensions: "{{.input.dimensions}}"

output: "{{.steps.realtime}}"
