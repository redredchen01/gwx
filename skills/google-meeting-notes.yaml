name: google-meeting-notes
version: "1.0"
description: "Generate meeting note templates — fetches upcoming meetings and creates a Google Doc with agenda placeholders."

meta:
  author: gwx
  category: google
  tags: calendar,docs

inputs:
  - name: days
    type: int
    required: false
    default: "1"
    description: "Look-ahead window in days"

steps:
  - id: meetings
    tool: calendar_agenda
    args:
      days: "{{.input.days}}"

  - id: create-doc
    tool: docs_create
    args:
      title: "Meeting Notes — {{.input.days}}d lookahead"
      body: "{{.steps.meetings}}"
    on_fail: skip

output: "{{.steps.meetings}}"
