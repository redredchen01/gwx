name: cross-form-to-slack
version: "1.0"
description: "Google Forms to Slack — checks recent form responses and posts a notification to a Slack channel."

meta:
  author: gwx
  category: cross
  tags: forms,slack

inputs:
  - name: form-id
    type: string
    required: true
    description: "Google Form ID"
  - name: channel
    type: string
    required: true
    description: "Slack channel for notifications"
  - name: limit
    type: int
    required: false
    default: "5"
    description: "Number of recent responses to check"

steps:
  - id: responses
    tool: forms_responses
    args:
      form_id: "{{.input.form-id}}"
      limit: "{{.input.limit}}"

  - id: count
    tool: transform
    args:
      input: "{{.steps.responses}}"
      count: "true"

  - id: notify
    tool: slack_send
    if: "{{.steps.count}}"
    args:
      channel: "{{.input.channel}}"
      text: "Form received {{.steps.count}} new response(s)"
    on_fail: skip

output: "{{.steps.responses}}"
