name: google-morning-brief
version: "1.0"
description: "Morning standup brief — unread emails, today's calendar, and pending tasks in one view."

meta:
  author: gwx
  category: google
  tags: gmail,calendar,tasks

inputs:
  - name: email-limit
    type: int
    required: false
    default: "10"
    description: "Max unread emails to show"

steps:
  - id: inbox
    tool: gmail_list
    args:
      limit: "{{.input.email-limit}}"
      unread: "true"

  - id: today
    tool: calendar_agenda
    args:
      days: "1"
    on_fail: skip

  - id: tasks
    tool: tasks_list
    args:
      show_completed: "false"
    on_fail: skip

output: "{{.steps.inbox}}"
