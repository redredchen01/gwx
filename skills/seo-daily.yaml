name: seo-daily
version: "1.0"
description: "SEO 每日快照 — Search Console 成效 + GA4 流量，存進 Sheets"

inputs:
  - name: site
    type: string
    required: true
    description: "網站 URL（如 https://example.com）"
  - name: property-id
    type: string
    required: true
    description: "GA4 Property ID（如 properties/123456）"
  - name: sheet-id
    type: string
    required: true
    description: "目標 Spreadsheet ID，用來存檔"

steps:
  - id: search-perf
    tool: searchconsole_query
    args:
      site: "{{.input.site}}"
      start_date: "2026-03-16"
      dimensions: "query,page"
      limit: "20"
    store: search-perf

  - id: traffic
    tool: analytics_report
    args:
      property: "{{.input.property-id}}"
      metrics: "sessions,activeUsers,screenPageViews"
      dimensions: "date"
      start_date: "7daysAgo"
      end_date: "today"
    store: traffic
    on_fail: skip

  - id: save
    tool: sheets_append
    args:
      spreadsheet_id: "{{.input.sheet-id}}"
      range: "SEO!A:E"
      values: "{{.steps.search-perf}}"
    store: save
    on_fail: skip

output: "{{.steps.search-perf}}"
