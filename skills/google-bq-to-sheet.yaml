name: google-bq-to-sheet
version: "1.0"
description: "BigQuery to Sheets — runs a SQL query and archives results to a Google Sheet."

meta:
  author: gwx
  category: google
  tags: bigquery,sheets

inputs:
  - name: project
    type: string
    required: true
    description: "GCP Project ID"
  - name: sql
    type: string
    required: true
    description: "SQL query to execute"
  - name: sheet-id
    type: string
    required: true
    description: "Spreadsheet ID for archiving query results"

steps:
  - id: query
    tool: bigquery_query
    args:
      project: "{{.input.project}}"
      sql: "{{.input.sql}}"
      limit: "100"

  - id: save
    tool: sheets_append
    args:
      spreadsheet_id: "{{.input.sheet-id}}"
      range: "BQ!A:Z"
      values: "{{.steps.query}}"
    on_fail: skip

output: "{{.steps.query}}"
