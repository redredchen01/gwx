name: cross-github-standup
version: "1.0"
description: "Developer standup — GitHub PRs + unread Gmail + today's calendar aggregated in parallel."

meta:
  author: gwx
  category: cross
  tags: github,gmail,calendar

inputs:
  - name: repo
    type: string
    required: true
    description: "GitHub repo (owner/repo)"
  - name: days
    type: int
    required: false
    default: "1"
    description: "Calendar look-back window in days"

steps:
  - id: prs
    tool: github_pulls
    args:
      owner: "{{.input.repo}}"
      state: "all"
      limit: "10"
    parallel: true
    on_fail: skip

  - id: inbox
    tool: gmail_list
    args:
      limit: "10"
      unread: "true"
    parallel: true
    on_fail: skip

  - id: today
    tool: calendar_agenda
    args:
      days: "{{.input.days}}"
    parallel: true
    on_fail: skip

output: "{{.steps.prs}}"
