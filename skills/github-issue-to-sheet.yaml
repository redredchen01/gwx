name: github-issue-to-sheet
version: "1.0"
description: "Export GitHub Issues to a Google Sheet — syncs issue metadata (number, title, state, author, date, labels) for project tracking."

meta:
  author: gwx
  category: github
  tags: github,sheets

inputs:
  - name: repo
    type: string
    required: true
    description: "GitHub repo (owner/repo)"
  - name: sheet-id
    type: string
    required: true
    description: "Target Google Spreadsheet ID"
  - name: state
    type: string
    required: false
    default: "open"
    description: "Issue state filter (open/closed/all)"

steps:
  - id: issues
    tool: github_issues
    args:
      owner: "{{.input.repo}}"
      state: "{{.input.state}}"
      limit: "100"

  - id: extract
    tool: transform
    args:
      input: "{{.steps.issues}}"
      pick: "number,title,state,user,created_at,labels"

  - id: write
    tool: sheets_append
    args:
      spreadsheet_id: "{{.input.sheet-id}}"
      range: "Issues!A:F"
      values: "{{.steps.extract}}"
    on_fail: skip

output: "{{.steps.issues}}"
