name: parallel-search
version: "1.0"
description: "Search Gmail and Drive in parallel for invoices, then combine results."

inputs:
  - name: query
    type: string
    required: true
    description: "Search term to look for across services"
  - name: limit
    type: int
    required: false
    default: "10"
    description: "Max results per service"

steps:
  - id: emails
    tool: gmail_search
    args:
      query: "{{.input.query}}"
      limit: "{{.input.limit}}"
    parallel: true

  - id: files
    tool: drive_search
    args:
      query: "{{.input.query}}"
      limit: "{{.input.limit}}"
    parallel: true

  - id: extract
    tool: transform
    args:
      input: "{{.steps.emails}}"
      pick: "from,subject,date"

  - id: combine
    tool: sheets_append
    args:
      spreadsheet_id: "auto"
      sheet: "Search Results"
      values: "{{.steps.extract}}"

output: "{{.steps.combine}}"
