name: google-task-report
version: "1.1"
description: "Task productivity report — lists all task lists, then fetches tasks from the default list."

meta:
  author: gwx
  category: google
  tags: tasks

inputs:
  - name: show-completed
    type: bool
    required: false
    default: "false"
    description: "Include completed tasks"
  - name: list-id
    type: string
    required: false
    default: "@default"
    description: "Task list ID (use @default for primary list, or get IDs from step 1)"

steps:
  - id: lists
    tool: tasks_lists
    args: {}

  - id: tasks
    tool: tasks_list
    args:
      list_id: "{{.input.list-id}}"
      show_completed: "{{.input.show-completed}}"

output: "{{.steps.tasks}}"
