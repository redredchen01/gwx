name: google-task-report
version: "1.0"
description: "Task productivity report — lists all task lists and their items, optionally including completed tasks."

meta:
  author: gwx
  category: google
  tags: tasks

inputs:
  - name: show-completed
    type: bool
    required: false
    default: "true"
    description: "Include completed tasks in the report"

steps:
  - id: lists
    tool: tasks_lists
    args: {}

  - id: tasks
    tool: tasks_list
    args:
      show_completed: "{{.input.show-completed}}"

output: "{{.steps.tasks}}"
