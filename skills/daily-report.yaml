name: daily-report
version: "1.0"
description: "每日綜合報告 — 串接 morning-brief（信件+行程+待辦）與 seo-daily（SEO 快照），一次執行兩個 skill"

inputs:
  - name: email-limit
    type: int
    required: false
    default: "20"
    description: "morning-brief 要顯示幾封最新信件"
  - name: site
    type: string
    required: true
    description: "網站 URL（如 https://example.com），用於 seo-daily"
  - name: property-id
    type: string
    required: true
    description: "GA4 Property ID（如 properties/123456），用於 seo-daily"
  - name: sheet-id
    type: string
    required: true
    description: "目標 Spreadsheet ID，seo-daily 存檔用"

steps:
  - id: standup
    tool: skill:morning-brief
    args:
      email-limit: "{{.input.email-limit}}"
    store: standup
    on_fail: skip

  - id: seo
    tool: skill:seo-daily
    args:
      site: "{{.input.site}}"
      property-id: "{{.input.property-id}}"
      sheet-id: "{{.input.sheet-id}}"
    store: seo
    on_fail: skip

output: "{{.steps.standup}}"
