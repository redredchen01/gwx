name: google-seo-daily
version: "1.1"
description: "Daily SEO snapshot — Search Console + GA4 traffic, saved to Sheets. Set recurring config with gwx config set."

meta:
  author: gwx
  category: google
  tags: searchconsole,analytics,sheets,seo
  config_hint: |
    gwx config set skill.google-seo-daily.site https://example.com
    gwx config set skill.google-seo-daily.property-id properties/123456
    gwx config set skill.google-seo-daily.sheet-id YOUR_SHEET_ID

inputs:
  - name: site
    type: string
    required: false
    default: ""
    description: "Website URL — falls back to config skill.google-seo-daily.site"
  - name: property-id
    type: string
    required: false
    default: ""
    description: "GA4 Property ID — falls back to config"
  - name: sheet-id
    type: string
    required: false
    default: ""
    description: "Target Spreadsheet ID — falls back to config"
  - name: start-date
    type: string
    required: false
    default: "2026-03-18"
    description: "Start date YYYY-MM-DD (SC requires absolute date)"

steps:
  - id: search-perf
    tool: searchconsole_query
    args:
      site: "{{.input.site}}"
      start_date: "{{.input.start-date}}"
      dimensions: "query,page"
      limit: "20"

  - id: traffic
    tool: analytics_report
    args:
      property: "{{.input.property-id}}"
      metrics: "sessions,activeUsers,screenPageViews"
      dimensions: "date"
      start_date: "7daysAgo"
      end_date: "today"
    on_fail: skip

  - id: save
    tool: sheets_append
    if: "{{.input.sheet-id}}"
    args:
      spreadsheet_id: "{{.input.sheet-id}}"
      range: "SEO!A:E"
      values: "{{.steps.search-perf}}"
    on_fail: skip

output: "{{.steps.search-perf}}"
