name: google-seo-daily
version: "1.0"
description: "Daily SEO snapshot — Search Console performance + GA4 traffic for the past 7 days, saved to Sheets."

meta:
  author: gwx
  category: google
  tags: searchconsole,analytics,sheets,seo

inputs:
  - name: site
    type: string
    required: true
    description: "Website URL (e.g. https://example.com)"
  - name: property-id
    type: string
    required: true
    description: "GA4 Property ID (e.g. properties/123456)"
  - name: sheet-id
    type: string
    required: true
    description: "Target Spreadsheet ID for archiving results"
  - name: start-date
    type: string
    required: true
    description: "Start date in YYYY-MM-DD format (e.g. 2026-03-18)"

steps:
  - id: search-perf
    tool: searchconsole_query
    args:
      site: "{{.input.site}}"
      start_date: "{{.input.start-date}}"
      dimensions: "query,page"
      limit: "20"

  - id: traffic
    tool: analytics_report
    args:
      property: "{{.input.property-id}}"
      metrics: "sessions,activeUsers,screenPageViews"
      dimensions: "date"
      start_date: "7daysAgo"
      end_date: "today"
    on_fail: skip

  - id: save
    tool: sheets_append
    args:
      spreadsheet_id: "{{.input.sheet-id}}"
      range: "SEO!A:E"
      values: "{{.steps.search-perf}}"
    on_fail: skip

output: "{{.steps.search-perf}}"
